name: Build and Publish glimmerhmm

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build smoke-test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: picotainers-local/glimmerhmm:smoke

      - name: Smoke test inference
        run: |
          set -euo pipefail
          mkdir -p testdata
          cat > testdata/smoke.fa <<'EOF'
          >chrTest
          ATGCGTACGTAGCTAGCTAGCTAGCTAGCTAGCTAACGATCGATCGATCGATCGATCGATCGATCGATCGATCGATCGATCGATCGATCGATCGATGCTAGCTAGCTAGCTAGCTAGCTAGCTAGCTAGCTAGCTAGCATCGATCGATCGATCGATCGATCGATCGATCGATCGATCGATCGATGCTAGCTAGCTAGCTAGCTAGCTAGCTAGCTAGCTAGCTAGCTAGCATCGATCGATCGATCGATCGATCGATCGATCGATCGATCGATCGAT
          EOF

          docker run --rm -v "$PWD/testdata:/data" picotainers-local/glimmerhmm:smoke \
            /data/smoke.fa /opt/conda/share/glimmerhmm/trained_dir/human -g -o /data/smoke.gff

          test -s testdata/smoke.gff
          grep -q '^##gff-version 3' testdata/smoke.gff
          grep -q '^##sequence-region chrTest ' testdata/smoke.gff

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: docker.io/picotainers/glimmerhmm:latest

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
